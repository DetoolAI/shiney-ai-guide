name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          grep -q '/assets/index-' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html

      - name: Publish to docs folder
        run: |
          rm -rf docs
          cp -r dist docs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Deploy site to docs folder [skip ci]"
          git push
